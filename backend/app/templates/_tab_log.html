<!-- ========================= LOG ========================= -->
<template x-if="tab==='log'">
<section aria-label="Log entry">
  <header class="section-header log-header">
    <template x-if="editingDate">
      <a @click.prevent="openNewEntry()" class="back-btn" title="New entry">←</a>
    </template>
    <h2 x-text="editingDate ? ('Edit ' + editingDate) : 'New entry'"></h2>
  </header>

  <div class="log-layout">

    <!-- ── Col 1: calendar + bulk trigger ───────────────────────── -->
    <div class="log-col-left">
      <div class="log-cal" :class="editingDate ? 'log-cal--editing' : ''">
        <div class="log-cal-header">
          <button type="button" class="log-cal-nav" @click="calPrev()" aria-label="Previous month">‹</button>
          <span class="log-cal-title" x-text="calMonthLabel()"></span>
          <button type="button" class="log-cal-nav" @click="calNext()" aria-label="Next month">›</button>
        </div>
        <div class="log-cal-grid">
          <template x-for="h in ['Mo','Tu','We','Th','Fr','Sa','Su']" :key="h">
            <div class="log-cal-dow" x-text="h"></div>
          </template>
          <template x-for="cell in calDays()" :key="cell.key">
            <button type="button"
                    class="log-cal-day"
                    :class="[cell.cls, cell.isToday ? 'cal-today' : '', cell.isSelected ? 'cal-selected' : '', cell.padded ? 'log-cal-pad' : '']"
                    @click="calSelectDay(cell.date)"
                    :disabled="cell.padded || !!editingDate"
                    x-text="cell.padded ? '' : cell.day"
                    :aria-label="cell.padded ? null : cell.date"
                    :aria-pressed="cell.isSelected ? 'true' : 'false'">
            </button>
          </template>
        </div>
        <div class="heatmap-legend log-cal-legend">
          <span class="legend-item"><span class="hm-swatch hm-surplus"></span> Surplus</span>
          <span class="legend-item"><span class="hm-swatch hm-deficit"></span> Deficit</span>
          <span class="legend-item"><span class="hm-swatch hm-neutral"></span> On target</span>
          <span class="legend-item"><span class="hm-swatch hm-vacation"></span> Vacation</span>
          <span class="legend-item"><span class="hm-swatch hm-sick"></span> Sick</span>
          <span class="legend-item"><span class="hm-swatch hm-holiday"></span> Holiday</span>
          <span class="legend-item"><span class="hm-swatch hm-flex"></span> Flex</span>
          <span class="legend-item"><span class="hm-swatch hm-empty"></span> No entry</span>
        </div>
      </div>

      <div class="bulk-trigger">
        <button type="button" class="secondary outline" @click="openBulkModal()" @touchend.prevent="openBulkModal()">Log multiple days…</button>
      </div>
    </div>

    <!-- ── Col 2: main form fields ──────────────────────────────── -->
    <div class="log-col-center">
      <form @submit.prevent="saveEntry()" class="log-main-form">
        <template x-if="templates.length > 0">
          <div class="template-bar">
            <span class="template-bar-label muted">Templates:</span>
            <template x-for="t in templates" :key="t.id">
              <button type="button" class="template-pill" @click="applyTemplate(t)">
                <span x-text="t.name"></span>
                <span class="muted template-times" x-text="t.start_time + '–' + t.end_time"></span>
              </button>
            </template>
          </div>
        </template>

        <!-- Day type -->
        <label>
          <span class="label-with-action">
            Day type
            <span class="day-pill day-pill-preview" :class="form.day_type" x-text="form.day_type"></span>
          </span>
          <select x-model="form.day_type">
            <option value="work">Work</option>
            <option value="vacation">Vacation</option>
            <option value="sick">Sick</option>
            <option value="holiday">Holiday</option>
            <option value="flex">Flex</option>
          </select>
        </label>

        <template x-if="form.day_type === 'work'">
          <div>
            <div class="grid">
              <label>
                Start time
                <div class="time-input-group">
                  <input type="time" x-model="form.start_time" required>
                  <button type="button" class="now-pill" x-show="form.date === todayIso()"
                          @click="stampNow('start_time')"
                          :title="'Stamp current time: ' + nowDisplay"
                          x-text="'⏱ ' + nowDisplay"></button>
                </div>
              </label>
              <label>
                End time
                <div class="time-input-group">
                  <input type="time" x-model="form.end_time">
                  <button type="button" class="now-pill" x-show="form.date === todayIso()"
                          @click="stampNow('end_time')"
                          :title="'Stamp current time: ' + nowDisplay"
                          x-text="'⏱ ' + nowDisplay"></button>
                </div>
              </label>
            </div>

            <fieldset>
              <legend>Breaks</legend>
              <template x-for="(b, i) in form.breaks" :key="i">
                <div class="break-row">
                  <div class="break-input-line">
                    <input type="time" x-model="b.start_time"
                           @change="b.start_time && b.end_time && (b.break_minutes = rangeMinutes(b.start_time, b.end_time))"
                           :aria-label="'Break ' + (i+1) + ' start'">
                    <span class="muted break-sep">→</span>
                    <input type="time" x-model="b.end_time"
                           @change="b.start_time && b.end_time && (b.break_minutes = rangeMinutes(b.start_time, b.end_time))"
                           :aria-label="'Break ' + (i+1) + ' end'">
                    <span class="muted break-sep">or</span>
                    <input type="number" x-model.number="b.break_minutes" min="1" max="720"
                           @input="b.start_time = ''; b.end_time = ''"
                           :aria-label="'Break ' + (i+1) + ' minutes'">
                    <span class="muted break-minutes-label" x-text="minutesToLabel(b.break_minutes)"></span>
                    <button type="button" class="contrast outline compact"
                            @click="removeBreak(i)" title="Remove break">−</button>
                  </div>
                </div>
              </template>
              <button type="button" class="secondary outline" @click="addBreak()">+ Add break</button>
            </fieldset>
          </div>
        </template>

        <template x-if="form.day_type === 'work' && !editingDate">
          <div class="save-template-row">
            <input type="text" x-model="_tplName" placeholder="Save as template…"
                   class="template-name-input"
                   @keydown.enter.prevent="if (_tplName.trim()) { saveCurrentAsTemplate(_tplName); _tplName = ''; showToast('Template saved', 'neutral'); }">
            <button type="button" class="secondary outline compact"
                    :disabled="!_tplName.trim()"
                    @click="saveCurrentAsTemplate(_tplName); _tplName = ''; showToast('Template saved', 'neutral')">
              Save as template
            </button>
          </div>
        </template>

        <div class="impact-card" x-show="logPreview()" x-transition.duration.200ms>
          <div class="impact-cell">
            <span class="impact-label">Net</span>
            <span class="impact-value" x-text="(logPreview()?.net_hours ?? '') + 'h'"></span>
          </div>
          <div class="impact-cell">
            <span class="impact-label">Target</span>
            <span class="impact-value" x-text="(logPreview()?.target_hours ?? '') + 'h'"></span>
          </div>
          <div class="impact-cell">
            <span class="impact-label">Δ</span>
            <span class="impact-value"
                  :class="surplusClass(logPreview()?.surplus_hours)"
                  x-text="formatSurplus(logPreview()?.surplus_hours)"></span>
          </div>
        </div>

        <!-- Notes for mobile/narrow — hidden on desktop (notes panel takes over) -->
        <label class="log-notes-inline">
          Notes (optional)
          <textarea x-model="form.notes" rows="2" placeholder="anything worth remembering about this day"></textarea>
        </label>

        <div class="form-footer">
          <button type="submit" x-text="editingDate ? 'Save changes' : 'Create entry'"></button>
          <template x-if="editingDate">
            <button type="button" class="contrast outline"
                    @click="deleteEntry(editingDate)">Delete</button>
          </template>
        </div>
      </form>
    </div><!-- /log-col-center -->

    <!-- ── Col 3: notes (desktop only) ──────────────────────────── -->
    <div class="log-col-notes" aria-hidden="true">
      <label>
        Notes (optional)
        <textarea x-model="form.notes" rows="10"
                  placeholder="anything worth remembering about this day…"></textarea>
      </label>
    </div>

  </div><!-- /log-layout -->

  <!-- Bulk log modal -->
  <template x-if="bulkModal.open">
    <div class="bulk-backdrop"
         @click.self="closeBulkModal()"
         @mouseup.window="bulkMouseup()"
         role="dialog"
         aria-modal="true"
         aria-label="Log multiple days">
      <div class="bulk-modal">
        <div class="bulk-modal-header">
          <h3>Log multiple days</h3>
          <button type="button" class="bulk-close" @click="closeBulkModal()" aria-label="Close">✕</button>
        </div>

        <div class="log-cal">
          <div class="log-cal-header">
            <button type="button" class="log-cal-nav" @click="bulkCalPrev()" aria-label="Previous month">‹</button>
            <span class="log-cal-title" x-text="bulkCalLabel()"></span>
            <button type="button" class="log-cal-nav" @click="bulkCalNext()" aria-label="Next month">›</button>
          </div>
          <div class="log-cal-grid" @mousemove="bulkGridMove($event)">
            <template x-for="h in ['Mo','Tu','We','Th','Fr','Sa','Su']" :key="h">
              <div class="log-cal-dow" x-text="h"></div>
            </template>
            <template x-for="cell in bulkCalDays()" :key="cell.key">
              <button type="button"
                      class="log-cal-day"
                      :class="[cell.cls, cell.padded ? 'log-cal-pad' : '', cell.isToday ? 'cal-today' : '', bulkIsHighlighted(cell.date) ? 'bulk-selected' : '', cell.weekend ? 'bulk-weekend' : '']"
                      @mousedown.prevent="bulkMousedown($event, cell.date)"
                      :data-bdate="cell.padded ? null : cell.date"
                      :disabled="cell.padded"
                      x-text="cell.padded ? '' : cell.day"
                      :aria-label="cell.padded ? null : cell.date"
                      :aria-pressed="bulkIsHighlighted(cell.date) ? 'true' : 'false'">
              </button>
            </template>
          </div>
          <p class="muted bulk-hint">Click to select · Click+drag to select a range</p>
        </div>

        <div class="bulk-pill">
          <span class="bulk-pill-count muted"
                x-text="bulkModal.selected.length + ' day' + (bulkModal.selected.length !== 1 ? 's' : '') + ' selected'"></span>
          <div class="bulk-pill-actions">
            <button type="button" class="bulk-pill-btn vacation" @click="bulkSubmit('vacation')" :disabled="!bulkModal.selected.length || bulkModal.submitting">Vacation</button>
            <button type="button" class="bulk-pill-btn sick"     @click="bulkSubmit('sick')"     :disabled="!bulkModal.selected.length || bulkModal.submitting">Sick</button>
            <button type="button" class="bulk-pill-btn holiday"  @click="bulkSubmit('holiday')"  :disabled="!bulkModal.selected.length || bulkModal.submitting">Holiday</button>
            <button type="button" class="bulk-pill-btn flex"     @click="bulkSubmit('flex')"     :disabled="!bulkModal.selected.length || bulkModal.submitting">Flex</button>
            <button type="button" class="bulk-pill-clear" @click="bulkModal.selected = []"
                    aria-label="Clear selection" title="Clear selection"
                    :style="bulkModal.selected.length === 0 ? 'visibility:hidden' : ''">✕</button>
          </div>
        </div>
      </div>
    </div>
  </template>

</section>
</template>
