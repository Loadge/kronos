<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kronos — hours tracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/icon.png">
  <link rel="apple-touch-icon" href="/static/icon.png">
  <meta name="theme-color" content="#1a1d22">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kronos">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/vendor/pico.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <!-- Apply persisted theme before first paint to avoid flash -->
  <script>(function(){var t=localStorage.getItem('k-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="/static/app.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
</head>
<body>
<main class="container" x-data="app()" x-init="init()" x-cloak>

  <header class="app-header">
    <!-- W6: egg emoji rides across the header when "kronos" is typed -->
    <span class="egg-emoji" :class="{ 'egg-go': eggAnimating }" aria-hidden="true">🎢</span>
    <div class="brand">
      <img src="/static/icon.png" alt="" class="brand-logo">
      <div>
        <h1>Kronos</h1>
        <p class="subtitle" x-text="subtitle">&nbsp;</p>
      </div>
    </div>
    <div class="header-right">
      <nav class="tabs" role="tablist" @keydown.right.prevent="focusTab(1,$event.target)" @keydown.left.prevent="focusTab(-1,$event.target)">
        <a role="tab" :tabindex="tab==='dashboard' ? 0 : -1" :aria-selected="tab==='dashboard'" @click.prevent="go('dashboard')" @keydown.enter.prevent="go('dashboard')" @keydown.space.prevent="go('dashboard')">Dashboard</a>
        <a role="tab" :tabindex="tab==='log' ? 0 : -1"       :aria-selected="tab==='log'"       @click.prevent="go('log')"       @keydown.enter.prevent="go('log')"       @keydown.space.prevent="go('log')">Log</a>
        <a role="tab" :tabindex="tab==='days' ? 0 : -1"      :aria-selected="tab==='days'"      @click.prevent="go('days')"      @keydown.enter.prevent="go('days')"      @keydown.space.prevent="go('days')">Days</a>
        <a role="tab" :tabindex="tab==='analytics' ? 0 : -1" :aria-selected="tab==='analytics'" @click.prevent="go('analytics')" @keydown.enter.prevent="go('analytics')" @keydown.space.prevent="go('analytics')">Analytics</a>
        <a role="tab" :tabindex="tab==='settings' ? 0 : -1"  :aria-selected="tab==='settings'"  @click.prevent="go('settings')"  @keydown.enter.prevent="go('settings')"  @keydown.space.prevent="go('settings')">Settings</a>
      </nav>
      <button class="theme-toggle" @click="toggleTheme()"
              :aria-label="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
              :title="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
        <span x-text="theme === 'dark' ? '☀' : '🌙'"></span>
      </button>
    </div>
  </header>

  <div class="error-banner" role="alert" x-show="error" x-text="error" @click="error=null"></div>

  <!-- W5: save confirmation ribbon -->
  <div class="save-ribbon-host">
    <div class="save-ribbon" role="status" aria-live="polite"
         :class="[toast.kind, toast.show ? 'ribbon-show' : '']">
      <span class="ribbon-tick"></span>
      <span class="ribbon-msg" x-text="toast.msg"></span>
    </div>
  </div>

  {% include "_tab_dashboard.html" %}
  {% include "_tab_log.html" %}
  {% include "_tab_days.html" %}
  {% include "_tab_analytics.html" %}
  {% include "_tab_settings.html" %}

  <!-- Command palette -->
  <template x-if="palette.open">
    <div class="palette-backdrop" @click.self="closePalette()" role="dialog" aria-label="Command palette" aria-modal="true">
      <div class="palette">
        <input id="k-palette-input" type="text"
               x-model="palette.query"
               @input="palette.selected = 0"
               @keydown.escape.prevent="closePalette()"
               @keydown.enter.prevent="paletteConfirm()"
               @keydown.arrow-up.prevent="paletteNavigate(-1)"
               @keydown.arrow-down.prevent="paletteNavigate(1)"
               placeholder="Type a command…"
               autocomplete="off" spellcheck="false">
        <ul role="listbox">
          <template x-for="(cmd, i) in filteredCommands()" :key="cmd.id">
            <li role="option" :aria-selected="palette.selected === i"
                :class="{ 'palette-selected': palette.selected === i }"
                @click="paletteRun(cmd)"
                @mouseenter="palette.selected = i">
              <span x-text="cmd.label"></span>
              <kbd x-text="cmd.hint"></kbd>
            </li>
          </template>
          <li x-show="filteredCommands().length === 0" class="palette-empty">No commands match.</li>
        </ul>
      </div>
    </div>
  </template>

</main>
</body>
</html>
