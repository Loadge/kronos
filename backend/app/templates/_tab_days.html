<!-- ========================= DAYS ========================= -->
<template x-if="tab==='days'">
<section aria-label="All logged days" x-init="$nextTick(() => scrollToToday())">
  <header class="section-header">
    <h2>Days</h2>
    <div class="section-header-controls">
      <select x-model="daysYear" style="width:auto">
        <option value="all">All years</option>
        <template x-for="y in yearsWithData()" :key="y">
          <option :value="y" x-text="y"></option>
        </template>
      </select>
      <span class="muted" x-text="sortedEntries().length + ' entries'"></span>
    </div>
  </header>

  <!-- E2: skeleton while first fetch is in-flight -->
  <template x-if="loading.days && !entries.length">
    <div class="table-wrap" aria-hidden="true">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Type</th><th>Start</th><th>End</th>
            <th>Breaks</th><th>Net</th><th>Target</th><th>Δ</th><th>Σ</th><th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="i in [1,2,3,4,5]" :key="i">
            <tr class="skel-row">
              <td><div class="skel-line"></div></td>
              <td><div class="skel-pill"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td><div class="skel-line skel-short"></div></td>
              <td></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <!-- empty state: only shown once loading is done -->
  <template x-if="!loading.days && !entries.length">
    <p class="muted">No entries yet. <a @click.prevent="go('log')">Log your first day</a>.</p>
  </template>

  <template x-if="entries.length">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th @click="sortBy('date')" class="sortable" role="columnheader" tabindex="0"
                :aria-sort="sortKey==='date' ? (sortDir==='asc' ? 'ascending' : 'descending') : 'none'"
                @keydown.enter.prevent="sortBy('date')" @keydown.space.prevent="sortBy('date')">Date</th>
            <th>Type</th>
            <th>Start</th>
            <th>End</th>
            <th>Breaks</th>
            <th @click="sortBy('net_hours')" class="sortable" role="columnheader" tabindex="0"
                :aria-sort="sortKey==='net_hours' ? (sortDir==='asc' ? 'ascending' : 'descending') : 'none'"
                @keydown.enter.prevent="sortBy('net_hours')" @keydown.space.prevent="sortBy('net_hours')">Net</th>
            <th>Target</th>
            <th>Δ</th>
            <th title="Running cumulative surplus from the start of the period">Σ</th>
            <th></th>
          </tr>
        </thead>
        <!-- One <tbody> per entry so we can inject a notes sub-row without a wrapper element -->
        <template x-for="e in sortedEntries()" :key="e.date">
          <tbody :id="'day-row-' + e.date" :class="{ 'today-row': e._isAnchor }">
            <!-- E2: _saving flag → dim row while API call is in-flight -->
            <tr :class="[e.day_type !== 'work' ? 'non-work' : '', e._saving ? 'row-saving' : '']">
              <td x-text="e.date"></td>
              <td><span class="day-pill" :class="e.day_type" x-text="e.day_type"></span></td>
              <td x-text="e.start_time || '—'"></td>
              <td x-text="e.end_time || '—'"></td>
              <td x-text="e.total_break_minutes ? e.total_break_minutes + 'm' : '—'"></td>
              <td x-text="e.net_hours + 'h'"></td>
              <td x-text="e.target_hours + 'h'"></td>
              <td :class="surplusClass(e.surplus_hours)" x-text="formatSurplus(e.surplus_hours)"></td>
              <td :class="surplusClass(e._cumulative)" x-text="formatSurplus(e._cumulative)"></td>
              <td>
                <div class="row-actions">
                  <template x-if="e.notes">
                    <button type="button" class="notes-btn" :class="notesExpanded[e.date] ? 'active' : ''"
                            @click="toggleNotes(e.date)" title="Toggle notes">📝</button>
                  </template>
                  <template x-if="!e._saving">
                    <button type="button" class="secondary outline compact" @click="editEntry(e)">Edit</button>
                  </template>
                  <template x-if="e._saving">
                    <span class="saving-indicator" aria-label="Saving…">⏳</span>
                  </template>
                </div>
              </td>
            </tr>
            <template x-if="notesExpanded[e.date] && e.notes">
              <tr class="notes-row">
                <td colspan="10" x-html="renderMarkdown(e.notes)"></td>
              </tr>
            </template>
          </tbody>
        </template>
      </table>
    </div>
  </template>
</section>
</template>
